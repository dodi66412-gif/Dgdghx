# .github/workflows/main.yml

name: MailTM Monitor

on:
  workflow_dispatch:

jobs:
  tempmail:
    runs-on: ubuntu-latest

    steps:

      - name: Install Packages
        run: |
          sudo apt-get update
          sudo apt-get install -y curl

      - name: Start Mail.tm Inbox Monitor
        run: |

          clear

          echo "================================="
          echo "MAIL.TM TEMP EMAIL GENERATOR"
          echo "================================="
          echo

          DOMAIN=$(curl -s https://api.mail.tm/domains | \
          grep '"domain"' | \
          head -n 1 | \
          cut -d '"' -f4)

          USER="user$(date +%s)"
          PASS="pass$(date +%s)"

          EMAIL="$USER@$DOMAIN"

          echo "Your Temporary Email Address Is:"
          echo "$EMAIL"
          echo

          echo "Password:"
          echo "$PASS"
          echo

          echo "================================="
          echo "CREATING ACCOUNT"
          echo "================================="

          curl -s -X POST https://api.mail.tm/accounts \
          -H "Content-Type: application/json" \
          -d "{\"address\":\"$EMAIL\",\"password\":\"$PASS\"}" > /dev/null

          TOKEN=$(curl -s -X POST https://api.mail.tm/token \
          -H "Content-Type: application/json" \
          -d "{\"address\":\"$EMAIL\",\"password\":\"$PASS\"}" | \
          grep '"token"' | \
          cut -d '"' -f4)

          echo
          echo "TOKEN:"
          echo "$TOKEN"
          echo

          echo "================================="
          echo "CHECK INBOX"
          echo "Press CTRL+C To Stop"
          echo "================================="

          while true
          do

              echo
              echo "================================="
              echo "CHECKING FOR NEW MESSAGES"
              echo "TIME: $(date)"
              echo "================================="

              INBOX=$(curl -s https://api.mail.tm/messages \
              -H "Authorization: Bearer $TOKEN")

              TOTAL=$(echo "$INBOX" | \
              grep '"id"' | \
              wc -l)

              echo
              echo "Total Messages:"
              echo "$TOTAL"
              echo

              echo "================================="
              echo "MESSAGE LIST"
              echo "================================="

              echo "$INBOX" | \
              sed 's/},{/\
/g' | \
              grep -E '"from"|"subject"' | \
              cut -d ':' -f2- | \
              sed 's/[\",]//g'

              IDS=$(echo "$INBOX" | \
              grep '"id"' | \
              cut -d '"' -f4)

              for ID in $IDS
              do

                  echo
                  echo "---------------------------------"
                  echo "MESSAGE ID:"
                  echo "$ID"
                  echo "---------------------------------"

                  MSG=$(curl -s https://api.mail.tm/messages/$ID \
                  -H "Authorization: Bearer $TOKEN")

                  echo "$MSG" | \
                  sed 's/,/\n/g' | \
                  grep -E '"from"|"subject"|"text"' | \
                  cut -d ':' -f2- | \
                  sed 's/[\",]//g'

                  echo "---------------------------------"

              done

              echo
              echo "Waiting 15 seconds..."
              sleep 15

          done
